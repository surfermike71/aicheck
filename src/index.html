<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; font-src 'self' data:;" />
  <link rel="stylesheet" href="../node_modules/@tabler/icons-webfont/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <title>AICHECK</title>
</head>
<body>

  <header>
    <div class="header-left">
      <i class="ti ti-paw logo-icon"></i>
      <span class="brand">AICHECK</span>
    </div>
    <div class="header-right">
      <button class="btn" id="btn-refresh">
        <i class="ti ti-refresh"></i> Refresh
      </button>
      <button class="btn" id="btn-pdf">
        <i class="ti ti-file-text"></i> Save PDF
      </button>
    </div>
  </header>

  <!-- PHASE 4 PREVIEW CONTROLS — remove in Phase 5 -->
  <div class="preview-controls">
    <span style="color:var(--tide);align-self:center;">Preview verdict:</span>
    <button onclick="setVerdict('green')">Green</button>
    <button onclick="setVerdict('yellow')">Yellow</button>
    <button onclick="setVerdict('red')">Red</button>
  </div>

  <main id="main-content">

    <!-- Verdict card -->
    <section class="verdict-card verdict-yellow" id="verdict-card">
      <i class="ti ti-alert-triangle verdict-icon" id="verdict-icon"></i>
      <h1 class="verdict-title" id="verdict-title">Almost there — 1 thing to sort out</h1>
      <p class="verdict-detail" id="verdict-detail">Claude Code will run fine on your machine. Claude Cowork needs a bit more RAM to work smoothly — see the fix below.</p>
    </section>

  </main>

  <script src="renderer.js"></script>

  <footer>
    <span class="footer-privacy">
      <i class="ti ti-lock"></i>
      Everything stays on your computer. Nothing is sent or saved anywhere.
    </span>
    <span>Version 0.1.0</span>
  </footer>

</body>
</html>
